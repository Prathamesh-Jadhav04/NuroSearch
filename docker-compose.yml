version: '3.9'

services:
  nurosearch:
    build: .
    image: ghcr.io/prathamesh-jadhav04/nurosearch:latest
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379
      - SQLITE_DB_PATH=/app/data/vectors.db
      - KAFKA_BOOTSTRAP=kafka:9092
      - OLLAMA_BASE_URL=http://host.docker.internal:11434  # Ollama runs on host
    volumes:
      - ./data:/app/data           # SQLite persistence
      - ./benchmark_report.json:/app/benchmark_report.json
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes  # persistence enabled
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: start with `docker compose --profile kafka up`
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    profiles: [kafka]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    profiles: [kafka]
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on: [zookeeper]
    restart: unless-stopped

  worker-1:
    build: .
    image: ghcr.io/prathamesh-jadhav04/nurosearch:latest
    profiles: [cluster]
    ports:
      - "8081:8081"
    command: python worker.py --port 8081 --node-id worker-1 --raft-host worker-1 --raft-port 8181 --partners worker-2:8182,worker-3:8183
    restart: unless-stopped

  worker-2:
    build: .
    image: ghcr.io/prathamesh-jadhav04/nurosearch:latest
    profiles: [cluster]
    ports:
      - "8082:8082"
    command: python worker.py --port 8082 --node-id worker-2 --raft-host worker-2 --raft-port 8182 --partners worker-1:8181,worker-3:8183
    restart: unless-stopped

  worker-3:
    build: .
    image: ghcr.io/prathamesh-jadhav04/nurosearch:latest
    profiles: [cluster]
    ports:
      - "8083:8083"
    command: python worker.py --port 8083 --node-id worker-3 --raft-host worker-3 --raft-port 8183 --partners worker-1:8181,worker-2:8182
    restart: unless-stopped

  coordinator:
    build: .
    image: ghcr.io/prathamesh-jadhav04/nurosearch:latest
    profiles: [cluster]
    ports:
      - "8089:8090"
    command: python coordinator.py
    environment:
      - WORKER_URLS=worker-1=http://worker-1:8081,worker-2=http://worker-2:8082,worker-3=http://worker-3:8083
    depends_on:
      - worker-1
      - worker-2
      - worker-3
    restart: unless-stopped

volumes:
  redis_data:
